# Crunz configuration — see https://github.com/crunzphp/crunz
#
# Timezone is fixed to UTC so the same crunz.yml works across all
# deployments (Malawi, Jamaica, Zimbabwe). Most jobs run every minute,
# so wall-clock alignment doesn't matter; the only time-anchored job is
# the nightly DB backup at 02:00 UTC, which lands in local-night for all
# current deployments.

source: tasks
suffix: Tasks.php
timezone: UTC
